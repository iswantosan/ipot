name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Analyze & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.7'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Seed env
        run: cp .env.example .env

      - name: Analyze
        run: flutter analyze

      - name: Tests
        run: flutter test --reporter expanded
