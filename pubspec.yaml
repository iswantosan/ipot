name: ipot
description: "Customer QR ordering app."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^14.6.0
  dio: ^5.7.0
  mobile_scanner: ^6.0.0
  cached_network_image: ^3.4.1
  flutter_dotenv: ^5.2.1
  intl: ^0.20.0
  equatable: ^2.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mocktail: ^1.0.4
  flutter_launcher_icons: ^0.14.2
  flutter_native_splash: ^2.4.4

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/mock/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/branding/icon.png"
  min_sdk_android: 21
  remove_alpha_ios: true
  adaptive_icon_background: "#E94B3C"
  adaptive_icon_foreground: "assets/branding/icon.png"

flutter_native_splash:
  color: "#E94B3C"
  image: assets/branding/splash_logo.png
  android: true
  ios: true
  android_12:
    color: "#E94B3C"
    image: assets/branding/splash_logo.png
